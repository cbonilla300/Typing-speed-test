<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Typing Speed Test</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="container">
    <header> 

      <section class="icons">

        <img src="./assets/images/logo-large.svg" alt="logo">
        
        <div class="personal-best">
          <img src="/assets/images/icon-personal-best.svg" alt="trophy">
          <span>Personal best:</span>
          <span>92 WPM</span>
        </div>

      </section>
      
    
      <section class="test-details">

        <div class="test-stats">
          <div class="stats ">WPM: <span class="wpm">0</span></div>
          <hr>
          <div class="stats ">Accuracy: <span class="accuracy">100%</span></div>
          <hr>
          <div class="stats ">Time: <span class="time">0:60</span></div>
        </div>
        
        <div class="test-settings">

          <div class="difficulty">
            <span>Difficulty:</span>
            <button type="button">Easy</button>  
            <button type="button"> Medium</button>
            <button type="button">Hard</button>
          </div>
          <hr>
          <div class="mode">
            <span>Mode:</span>
            <button type="button" id="timed">Timed (60s)</button>
            <button type="button">Passage</button>
          </div>
          
        </div>

      </section>
    </header>  
    <main>

    </main> 
  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
  <script src="script.js"></script>
  
</body>
</html>
